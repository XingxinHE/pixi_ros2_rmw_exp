[workspace]
authors = ["Xingxin HE <xingxin.he@mail.polimi.it>"]
channels = ["robostack-humble", "conda-forge"]
name = "pixi_ros2_pub"
platforms = ["linux-64"]
version = "0.1.0"

[activation]

[activation.env]
ROS_DOMAIN_ID="110"
RMW_IMPLEMENTATION="rmw_cyclonedds_cpp"

[tasks]
pub = "ros2 run demo_nodes_cpp talker"
doctor = "ros2 doctor -r | grep rmw_cyclonedds_cpp"

[dependencies]
ros-humble-desktop = ">=0.10.0,<0.11"
ros-humble-rmw-cyclonedds-cpp = ">=1.3.4,<2"

